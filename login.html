<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login - Deep Space</title>
    <link rel="icon" href="https://img.icons8.com/ios-filled/50/ffffff/interior-design.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                    },
                    colors: {
                        wood: {
                            50: '#EFEBE9',
                            100: '#D7CCC8',
                            200: '#BCAAA4',
                            300: '#A1887F',
                            400: '#8D6E63',
                            500: '#795548',
                            600: '#6D4C41',
                            700: '#5D4037',
                            800: '#4E342E',
                            900: '#3E2723',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            transition: background-color 0.3s ease;
        }

        .login-card {
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease;
        }

        .login-card:hover {
            transform: translateY(-2px);
        }

        .input-focus:focus {
            ring: 2px solid #5D4037;
            border-color: #5D4037;
            outline: none;
        }

        /* Improved dark mode visibility */
        .dark .text-wood-700 {
            color: #EFEBE9 !important;
        }

        .dark .text-wood-600 {
            color: #D7CCC8 !important;
        }

        .dark .text-wood-500 {
            color: #BCAAA4 !important;
        }

        .dark .border-wood-200 {
            border-color: #4E342E !important;
        }

        .dark .bg-white {
            background-color: #2D2A2A !important;
        }

        .dark .bg-wood-50 {
            background-color: #1a1412 !important;
        }

        /* RTL specific adjustments */
        [dir="rtl"] .space-x-reverse {
            flex-direction: row-reverse;
        }

        [dir="rtl"] .text-left {
            text-align: right;
        }

        [dir="rtl"] .mr-2 {
            margin-left: 0.5rem;
            margin-right: 0;
        }
        
        [dir="rtl"] .password-toggle {
            right: auto;
            left: 1rem;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-wood-50 to-wood-100 dark:from-[#1a1412] dark:to-[#0f0c0a] transition-colors duration-300 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">

        <!-- Theme and RTL Toggle Buttons (Top Right) -->
        <div class="flex justify-end gap-3 mb-6">
            <button id="themeToggleBtn"
                class="p-2.5 rounded-xl bg-white dark:bg-wood-800 shadow-md border border-wood-200 dark:border-wood-700 text-wood-600 dark:text-wood-300 hover:bg-wood-50 dark:hover:bg-wood-700 transition-all duration-200">
                <i id="themeIcon" class="bi bi-moon-fill text-lg"></i>
            </button>
            <button id="rtlToggleBtn"
                class="p-2.5 rounded-xl bg-white dark:bg-wood-800 shadow-md border border-wood-200 dark:border-wood-700 text-wood-600 dark:text-wood-300 hover:bg-wood-50 dark:hover:bg-wood-700 transition-all duration-200">
                <i class="bi bi-arrow-left-right text-lg"></i>
            </button>
        </div>

        <!-- Login Card -->
        <div
            class="login-card bg-white dark:bg-wood-800 rounded-3xl shadow-2xl border border-wood-200 dark:border-wood-700 overflow-hidden transition-all duration-300">
            
            <!-- Header -->
            <div class="p-8 pb-6 text-center border-b border-wood-100 dark:border-wood-700">
                <h1 class="text-2xl font-bold text-[#3E2723] dark:text-white">
                    <a href="index.html" class="flex items-center justify-center gap-2 transition">
                        <i class="bi bi-layers-half text-[#8D6E63] dark:text-white"></i>
                        <span class="tracking-tight">DEEP</span>
                        <span class="font-normal">SPACE</span>
                    </a>
                </h1>
                <p class="text-sm text-wood-500 dark:text-wood-400 mt-2">Login to your account to continue</p>
            </div>

            <!-- Login Form -->
            <div class="p-8">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <!-- Email Field -->
                    <div class="mb-5">
                        <label for="email" class="block text-sm font-semibold text-wood-700 dark:text-wood-200 mb-2">
                            <i class="bi bi-envelope-fill mr-2 text-wood-500 dark:text-wood-400"></i> Email Address
                        </label>
                        <input type="email" id="email" name="email" required
                            class="input-focus w-full px-4 py-3 rounded-xl border border-wood-200 dark:border-wood-600 bg-wood-50 dark:bg-wood-900/50 text-wood-700 dark:text-wood-200 placeholder-wood-400 dark:placeholder-wood-500 focus:ring-2 focus:ring-wood-500 focus:border-transparent transition-all duration-200"
                            placeholder="john@example.com">
                    </div>

                    <!-- Password Field with Eye Icon -->
                    <div class="mb-4">
                        <label for="password" class="block text-sm font-semibold text-wood-700 dark:text-wood-200 mb-2">
                            <i class="bi bi-lock-fill mr-2 text-wood-500 dark:text-wood-400"></i> Password
                        </label>
                        <div class="relative">
                            <input type="password" id="password" name="password" required
                                class="input-focus w-full px-4 py-3 rounded-xl border border-wood-200 dark:border-wood-600 bg-wood-50 dark:bg-wood-900/50 text-wood-700 dark:text-wood-200 placeholder-wood-400 dark:placeholder-wood-500 focus:ring-2 focus:ring-wood-500 focus:border-transparent transition-all duration-200 pr-12"
                                placeholder="Enter your password">
                            <button type="button" id="togglePassword"
                                class="absolute inset-y-0 right-3 flex items-center text-wood-500 dark:text-wood-400 hover:text-wood-700 dark:hover:text-wood-200 transition">
                                <i id="passwordEyeIcon" class="bi bi-eye-slash-fill text-lg"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me and Forgot Password in same row -->
                    <div class="flex items-center justify-between mb-6">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-wood-300 dark:border-wood-600 text-wood-600 focus:ring-wood-500 focus:ring-offset-0">
                            <span class="ml-2 text-sm text-wood-600 dark:text-wood-400">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-wood-500 dark:text-wood-400 hover:text-wood-700 dark:hover:text-wood-200 transition font-medium">
                            Forgot password?
                        </a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-wood-700 to-wood-600 hover:from-wood-800 hover:to-wood-700 text-white font-semibold py-3 rounded-xl shadow-md hover:shadow-lg transition-all duration-200 transform hover:scale-[1.02]">
                        <i class="bi bi-box-arrow-in-right mr-2"></i> Sign In
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-wood-200 dark:border-wood-700"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-3 bg-white dark:bg-wood-800 text-wood-500 dark:text-wood-400">Or continue with</span>
                    </div>
                </div>

                <!-- Social Login Buttons -->
                <div class="grid grid-cols-2 gap-3">
                    <button type="button"
                        class="flex items-center justify-center gap-2 px-4 py-3 border border-wood-200 dark:border-wood-600 rounded-xl text-wood-600 dark:text-wood-300 hover:bg-wood-50 dark:hover:bg-wood-700 transition-all duration-200">
                        <i class="bi bi-google text-lg"></i>
                        <span class="text-sm">Google</span>
                    </button>
                    <button type="button"
                        class="flex items-center justify-center gap-2 px-4 py-3 border border-wood-200 dark:border-wood-600 rounded-xl text-wood-600 dark:text-wood-300 hover:bg-wood-50 dark:hover:bg-wood-700 transition-all duration-200">
                        <i class="bi bi-apple text-lg"></i>
                        <span class="text-sm">Apple</span>
                    </button>
                </div>

                <!-- Sign Up Link -->
                <p class="text-center text-sm text-wood-500 dark:text-wood-400 mt-6">
                    Don't have an account? 
                    <a href="sign.html" class="font-semibold text-wood-700 dark:text-wood-300 hover:text-wood-600 dark:hover:text-wood-200 transition">
                        Create an account
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Theme Toggle Functionality
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
                updateThemeIcon(true);
            } else {
                document.documentElement.classList.remove('dark');
                updateThemeIcon(false);
            }
        }

        function updateThemeIcon(isDark) {
            const themeIcon = document.getElementById('themeIcon');
            if (themeIcon) {
                themeIcon.className = isDark ? 'bi bi-sun-fill text-lg' : 'bi bi-moon-fill text-lg';
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            if (isDark) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                updateThemeIcon(false);
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                updateThemeIcon(true);
            }
        }

        // RTL Toggle Functionality
        function initRTL() {
            const savedDir = localStorage.getItem('dir');
            if (savedDir === 'rtl') {
                document.documentElement.dir = 'rtl';
            } else {
                document.documentElement.dir = 'ltr';
            }
        }

        function toggleRTL() {
            const currentDir = document.documentElement.dir;
            const newDir = currentDir === 'rtl' ? 'ltr' : 'rtl';
            document.documentElement.dir = newDir;
            localStorage.setItem('dir', newDir);
        }

        // Password Visibility Toggle
        function initPasswordToggle() {
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('passwordEyeIcon');
            
            if (toggleBtn && passwordInput && eyeIcon) {
                toggleBtn.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    eyeIcon.className = type === 'password' ? 'bi bi-eye-slash-fill text-lg' : 'bi bi-eye-fill text-lg';
                });
            }
        }

        // Handle Login
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe')?.checked || false;
            
            // Store remember me preference
            if (rememberMe) {
                localStorage.setItem('rememberedEmail', email);
            } else {
                localStorage.removeItem('rememberedEmail');
            }
            
            // Simple demo validation - redirect based on email domain or specific credentials
            if (email === 'admin@stagingstudio.com' && password === 'password123') {
                window.location.href = 'admin-dashboard.html';
            } else if (email === 'linda@example.com' && password === 'password123') {
                window.location.href = 'client-dashboard.html';
            } else if (email === 'user@example.com' && password === 'password123') {
                window.location.href = 'client-dashboard.html';
            } else if (email && password.length >= 4) {
                alert('Login successful! Redirecting to dashboard...');
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('Invalid credentials. Please use:\nAdmin: admin@stagingstudio.com / password123\nClient: linda@example.com / password123');
            }
        }

        // Load remembered email if exists
        function loadRememberedEmail() {
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            if (rememberedEmail && document.getElementById('email')) {
                document.getElementById('email').value = rememberedEmail;
                const rememberCheckbox = document.getElementById('rememberMe');
                if (rememberCheckbox) rememberCheckbox.checked = true;
            }
        }

        // Attach event listeners
        document.getElementById('themeToggleBtn')?.addEventListener('click', toggleTheme);
        document.getElementById('rtlToggleBtn')?.addEventListener('click', toggleRTL);
        
        // Initialize on page load
        initTheme();
        initRTL();
        initPasswordToggle();
        loadRememberedEmail();

        // Add animation to inputs on focus
        const inputs = document.querySelectorAll('input:not([type="checkbox"])');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement?.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', function() {
                this.parentElement?.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body>

</html>
