<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404 - Page Not Found | Deep Space</title>
     <link rel="icon" href="images/logo.jpeg">
    <link rel="icon" href="https://img.icons8.com/ios-filled/50/ffffff/interior-design.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                    },
                    colors: {
                        wood: {
                            50: '#EFEBE9',
                            100: '#D7CCC8',
                            200: '#BCAAA4',
                            300: '#A1887F',
                            400: '#8D6E63',
                            500: '#795548',
                            600: '#6D4C41',
                            700: '#5D4037',
                            800: '#4E342E',
                            900: '#3E2723',
                        }
                    },
                    animation: {
                        'bounce-slow': 'bounce 2s ease-in-out infinite',
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'wiggle': 'wiggle 0.5s ease-in-out',
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(0deg)' },
                            '25%': { transform: 'rotate(-5deg)' },
                            '75%': { transform: 'rotate(5deg)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #EFEBE9 0%, #D7CCC8 100%);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
    </style>
</head>

<body class="font-sans antialiased min-h-screen flex items-center justify-center p-4">
    
    <div class="max-w-md w-full text-center fade-in-up">
        
        <!-- Logo / Icon -->
        <div class="mb-6 animate-float">
            <div class="w-20 h-20 bg-gradient-to-br from-wood-600 to-wood-700 rounded-2xl flex items-center justify-center shadow-lg mx-auto">
                <i class="bi bi-compass text-4xl text-white"></i>
            </div>
        </div>

        <!-- 404 Number -->
        <div class="mb-4 fade-in-up delay-100">
            <h1 class="text-8xl font-semibold text-wood-700 tracking-tighter">404</h1>
        </div>

        <!-- Message -->
        <div class="mb-6 fade-in-up delay-200">
            <h2 class="text-xl font-semibold text-wood-700 mb-2">Page Not Found</h2>
            <p class="text-wood-500 text-sm">
                The page you are looking for doesn't exist or has been moved.
            </p>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center fade-in-up delay-300">
            <button onclick="history.back()"
                class="px-6 py-3 border-2 border-wood-400 rounded-xl text-wood-600 font-medium hover:bg-wood-100 transition-all duration-200 cursor-pointer">
                <i class="bi bi-arrow-left mr-2"></i>
                Go Back
            </button>
            <a href="index.html"
                class="px-6 py-3 bg-wood-700 hover:bg-wood-600 text-white font-medium rounded-xl shadow-md transition-all duration-200">
                <i class="bi bi-house-door mr-2"></i>
                Home Page
            </a>
        </div>

        <!-- Footer -->
        <p class="text-xs text-wood-400 mt-8">
            StagingStudio â€” Home Renovation Visualizer
        </p>
    </div>

    <script>
        // Simple console message
        console.log('404 | Page not found');
    </script>
</body>

</html>
